<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="google-site-verification" content="MjaJeZGyI_CNEvg-2nFsrhpJWlfRFZU9PBVvvZJIocM" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GGHGG91FC6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GGHGG91FC6');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:type" content="article">
    <link rel="canonical" href="{{CANONICAL_URL}}">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 720px;
            margin: 0 auto;
            padding: 24px;
            line-height: 1.7;
            color: #1a1a1a;
            background: #fafafa;
        }
        header { margin-bottom: 32px; border-bottom: 1px solid #e0e0e0; padding-bottom: 16px; }
        header a { text-decoration: none; color: #1a1a1a; font-weight: 700; font-size: 20px; }
        h1 { font-size: 28px; line-height: 1.3; margin-bottom: 8px; }
        .meta { color: #666; font-size: 14px; margin-bottom: 24px; }
        .content p { margin-bottom: 20px; }
        .content h2 { margin-top: 32px; font-size: 22px; }
        .cta-box {
            background: #eef4ff;
            border: 1px solid #c9dcff;
            border-radius: 8px;
            padding: 20px;
            margin: 28px 0;
            text-align: center;
        }
        .cta-box a {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 8px;
        }
        footer { margin-top: 48px; padding-top: 16px; border-top: 1px solid #e0e0e0; color: #666; font-size: 13px; }
        .disclosure { background: #fff8e1; border-radius: 6px; padding: 12px; font-size: 13px; margin-bottom: 24px; }
    </style>
</head>
<body>
    <header><a href="index.html">💻 {{SITE_NAME}}</a></header>

    <article>
        <h1>{{TITLE}}</h1>
        <div class="meta">Published on {{DATE}}</div>

        <div class="disclosure">
            This article contains affiliate links. If you buy through these links, we may earn a small commission at no extra cost to you.
        </div>

        <div class="content">
            {{CONTENT}}
        </div>

        <div class="cta-box">
            <p>{{CTA_TEXT}}</p>
            <a href="{{AFFILIATE_LINK}}" rel="nofollow sponsored" target="_blank">{{CTA_BUTTON_TEXT}}</a>
        </div>
    </article>

    <footer>
        &copy; {{YEAR}} {{SITE_NAME}} — <a href="index.html">Back to home</a>
    </footer>
</body>
</html>
