<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="google-site-verification" content="MjaJeZGyI_CNEvg-2nFsrhpJWlfRFZU9PBVvvZJIocM" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GGHGG91FC6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GGHGG91FC6');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{SITE_NAME}} — Tech & Software Deals</title>
    <meta name="description" content="{{SITE_DESCRIPTION}}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #171a23;
            --surface-hover: #1e222d;
            --border: #262b38;
            --text: #f4f5f7;
            --text-muted: #9aa1b1;
            --accent: #7c5cff;
            --accent-soft: rgba(124, 92, 255, 0.12);
            --accent-hover: #6a4ce6;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .wrap { max-width: 880px; margin: 0 auto; padding: 0 20px; }

        nav {
            border-bottom: 1px solid var(--border);
            padding: 18px 0;
            position: sticky;
            top: 0;
            background: rgba(15, 17, 23, 0.85);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        nav .wrap { display: flex; align-items: center; justify-content: space-between; }
        .logo { font-weight: 800; font-size: 19px; color: var(--text); text-decoration: none; letter-spacing: -0.02em; }
        .logo span { color: var(--accent); }

        header.hero { padding: 56px 0 40px; text-align: center; }
        header.hero h1 { font-size: 34px; font-weight: 800; margin: 0 0 10px; letter-spacing: -0.03em; }
        header.hero p { color: var(--text-muted); font-size: 16px; margin: 0; max-width: 480px; margin: 0 auto; }

        main { padding-bottom: 60px; }
        .grid { display: grid; gap: 14px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px 24px;
            transition: border-color 0.15s ease, transform 0.15s ease;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-1px); }
        .card a { text-decoration: none; color: inherit; display: block; }
        .card .tag {
            display: inline-block;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 3px 9px;
            border-radius: 999px;
            margin-bottom: 10px;
        }
        .card h2 { font-size: 18px; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.01em; }
        .card .date { color: var(--text-muted); font-size: 12.5px; margin-bottom: 8px; }
        .card .excerpt { color: var(--text-muted); font-size: 14.5px; margin: 0; }

        footer {
            border-top: 1px solid var(--border);
            padding: 28px 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        @media (max-width: 480px) {
            header.hero { padding: 40px 0 28px; }
            header.hero h1 { font-size: 26px; }
            .card { padding: 18px 20px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="wrap">
            <a class="logo" href="index.html">💻 {{SITE_NAME_PART1}}<span>{{SITE_NAME_PART2}}</span></a>
        </div>
    </nav>

    <header class="hero">
        <div class="wrap">
            <h1>The best software & VPN deals</h1>
            <p>{{SITE_DESCRIPTION}}</p>
        </div>
    </header>

    <main class="wrap">
        <div class="grid">
            {{ARTICLE_LIST}}
        </div>
    </main>

    <footer>
        <div class="wrap">&copy; {{YEAR}} {{SITE_NAME}} — All rights reserved</div>
    </footer>
</body>
</html>
